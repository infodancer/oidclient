name: CI

# Thin caller: the Go CI logic lives in infodancer/workflows so test/vet/fmt/
# lint/govulncheck stay identical across repos. See that repo's README.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    uses: infodancer/workflows/.github/workflows/go-ci.yml@v0.2.0
